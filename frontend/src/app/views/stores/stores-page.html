<app-page-padder>
  <div class="grid grid-cols-3 gap-4">
    @for (store of storeLocations(); track store.storeLocationId) {
      <mat-card class="flex h-full flex-col">
        <div
          class="flex aspect-4/3 items-center justify-center overflow-hidden bg-gray-100"
          aria-hidden="true"
        >
          <span class="text-sm text-gray-400">Store</span>
        </div>
        <mat-card-header>
          <mat-card-title>{{ store.displayName }}</mat-card-title>
        </mat-card-header>
        <mat-card-content class="flex flex-1 flex-col gap-2">
          <p class="text-sm text-gray-600">{{ store.address }}</p>
        </mat-card-content>
      </mat-card>
    }
  </div>
</app-page-padder>
