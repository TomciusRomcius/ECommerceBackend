<div class="flex justify-between">
  <div>
    @if (storeLocation(); as store) {
      <h1 class="text-xl">{{ store.displayName }}</h1>
      <p class="text-sm text-gray-600">{{ store.address }}</p>
    } @else {
      <h1 class="text-xl">Store</h1>
    }
  </div>
  <a mat-flat-button routerLink="/admin/stores">Back to stores</a>
</div>

<h2 class="mb-4 mt-8 text-lg font-medium">Products</h2>
<table mat-table [dataSource]="products().data" class="w-full">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let product">{{ product.name }}</td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef>Price</th>
    <td mat-cell *matCellDef="let product">{{ product.price | currency }}</td>
  </ng-container>

  <ng-container matColumnDef="stock">
    <th mat-header-cell *matHeaderCellDef>Stock</th>
    <td mat-cell *matCellDef="let product">{{ product.store?.stock ?? '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let product">
      <button mat-button type="button" (click)="edit(product)">Edit</button>
      <button mat-button type="button" color="warn" (click)="delete(product)">Delete</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
  <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
</table>

@if (products().totalCount > 0) {
  <app-paginator class="mt-8" [data]="products()" />
}
