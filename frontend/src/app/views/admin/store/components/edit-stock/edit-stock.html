<app-modal-template>
    <h1 class="text-xl">Adjust stock</h1>
    <form [formGroup]="form" appearance="fill">
        <mat-form-field>
            <mat-label>Stock</mat-label>
            <input type="number" formControlName="stock" matInput />
        </mat-form-field>
    </form>
    @if (error()) {
      <p class="text-sm text-red-600">{{ error() }}</p>
    }
    <button (click)="submit()" mat-flat-button type="button" [disabled]="loading()">
      {{ loading() ? 'Saving…' : 'Submit' }}
    </button>
</app-modal-template>
