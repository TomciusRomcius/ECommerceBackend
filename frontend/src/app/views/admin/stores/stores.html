<div class="flex justify-between">
  <h1 class="text-xl">Stores</h1>
  <a mat-flat-button routerLink="/admin/stores/create">Create</a>
</div>
<table mat-table [dataSource]="storeLocations()" class="w-full">
  <ng-container matColumnDef="displayName">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let store">{{ store.displayName }}</td>
  </ng-container>

  <ng-container matColumnDef="address">
    <th mat-header-cell *matHeaderCellDef>Address</th>
    <td mat-cell *matCellDef="let store">{{ store.address }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let store">
      <button mat-button type="button" (click)="edit(store)">Edit</button>
      <button mat-button type="button" color="warn" (click)="delete(store)">Delete</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
  <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
</table>
