<div class="flex justify-between">
  <h1 class="text-xl">Categories</h1>
  <a mat-flat-button routerLink="/admin/categories/create">Create</a>
</div>
<app-search-bar />
<table mat-table [dataSource]="categories()" class="w-full">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let category">{{ category.name }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let category">
      <button mat-button type="button" (click)="edit(category)">Edit</button>
      <button mat-button type="button" color="warn" (click)="delete(category)">Delete</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
  <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
</table>
