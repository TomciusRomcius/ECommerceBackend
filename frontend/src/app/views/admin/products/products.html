<div class="flex justify-between">
  <h1 class="text-xl">Products</h1>
  <a mat-flat-button routerLink="/admin/products/create">Create</a>
</div>
<app-search-bar />
<table mat-table [dataSource]="products().data" class="w-full">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let product">{{ product.name }}</td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef>Price</th>
    <td mat-cell *matCellDef="let product">{{ product.price | currency }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let product">
      <button mat-button type="button" (click)="edit(product)">Edit</button>
      <button mat-button type="button" color="warn" (click)="delete(product)">Delete</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
  <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
</table>

@if (products().totalCount > 0) {
  <app-paginator class="mt-8" [data]="products()" />
}
