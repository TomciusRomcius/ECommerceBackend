<app-page-padder>
  <div class="grid grid-cols-3 gap-4">
    @for (product of products(); track product.productId) {
      <mat-card class="flex h-full flex-col">
        <div
          class="flex aspect-4/3 items-center justify-center overflow-hidden bg-gray-100"
          aria-hidden="true"
        >
          <!-- Image URL will be wired here later -->
          <span class="text-sm text-gray-400">No image</span>
        </div>
        <mat-card-header>
          <mat-card-title>{{ product.name }}</mat-card-title>
          <mat-card-subtitle>{{ product.manufacturer.name }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content class="flex flex-1 flex-col gap-2">
          <p class="text-sm text-gray-600 line-clamp-2">{{ product.description }}</p>
          <p class="text-xs text-gray-500">{{ product.category.name }}</p>
          <p class="font-semibold">{{ product.price | currency }}</p>
          <a
            mat-flat-button
            color="primary"
            class="mt-auto"
            [routerLink]="['/product', product.productId]"
          >
            View product
          </a>
        </mat-card-content>
      </mat-card>
    }
  </div>
</app-page-padder>
