<header class="fixed inset-x-0 top-0 z-50 border-b border-gray-200 bg-white">
  <nav
    class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3"
    aria-label="Main navigation"
  >
    <div class="flex items-center gap-6">
      <a
        routerLink="/home"
        routerLinkActive="font-semibold text-gray-900"
        [routerLinkActiveOptions]="{ exact: false }"
        class="text-sm text-gray-600 hover:text-gray-900"
      >
        Home
      </a>
      <a
        routerLink="/stores"
        routerLinkActive="font-semibold text-gray-900"
        class="text-sm text-gray-600 hover:text-gray-900"
      >
        Stores
      </a>
      <a
        routerLink="/admin"
        routerLinkActive="font-semibold text-gray-900"
        class="text-sm text-gray-600 hover:text-gray-900"
      >
        Admin
      </a>
    </div>

    <div class="flex items-center gap-1">
      <button
        type="button"
        class="rounded-full p-2 text-gray-600 hover:bg-gray-100 hover:text-gray-900"
        aria-label="Account"
      >
        <mat-icon>person</mat-icon>
      </button>
      <a
        routerLink="/cart"
        routerLinkActive="bg-gray-100 text-gray-900"
        class="rounded-full p-2 text-gray-600 hover:bg-gray-100 hover:text-gray-900"
        aria-label="Cart"
      >
        <mat-icon>shopping_cart</mat-icon>
      </a>
    </div>
  </nav>
</header>

<main class="px-4 pb-8 pt-20">
  <ng-content />
</main>
