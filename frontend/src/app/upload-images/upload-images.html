<div class="flex flex-col gap-2 items-start">
  <input #fileInput (change)="onFileSelected($event)" type="file" accept="image/*" id="file-upload" class="hidden" multiple/>
  <button mat-button type="button" (click)="fileInput.click()">
    Upload
  </button>
  @if (imagesRequired() && imagesSignal()().length === 0) {
    <p class="text-sm text-red-600">Images required</p>
  }
  @if (error()) {
    <p class="text-sm text-red-600" role="alert">{{ error() }}</p>
  }

  <div class="flex gap-2 overflow-x-auto w-full rounded-md overflow-hidden">
    @for (image of imagesData(); track $index) {
      <div class="relative shrink-0 w-64 h-64">
        <button (click)="deleteImage(image.id)" class="absolute top-0 right-0.5 z-10">
          <mat-icon>delete</mat-icon>
        </button>
        <div class="relative w-full h-full">
          <div class="absolute w-full h-full top-0 bg-transparent hover:bg-black/10 transition-all"></div>
          <img [src]="image.data64" class="w-full h-full object-cover" />
        </div>
      </div>
    }
  </div>
</div>
