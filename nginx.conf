events {}
http {
  log_format upstream_trace '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'upstream_url="$scheme://$proxy_host$uri$is_args$args" '
                           'upstream_addr="$upstream_addr" upstream_status="$upstream_status" '
                           'request_time="$request_time" upstream_response_time="$upstream_response_time"';
  access_log /var/log/nginx/access.log upstream_trace;

  server {
    listen 80;
    
    location = /bff {
        return 301 /bff/;
    }

    location /bff/ {
      resolver 127.0.0.11 valid=30s;
      set $bff_host bff:8080;
      proxy_pass http://$bff_host/;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    location = /userservice {
        return 301 /userservice/;
    }

    location /userservice/ {
      resolver 127.0.0.11 valid=30s;
      set $user_service_host user-service:8080;
      proxy_pass http://$user_service_host/;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    location = /productservice {
      return 301 /productservice/;
    }

    location /productservice/ {
      resolver 127.0.0.11 valid=30s;
      set $product_service_host product-service:8080;
      proxy_pass http://$product_service_host/;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    location = /storeservice {
      return 301 /storeservice/;
    }

    location /storeservice/ {
      resolver 127.0.0.11 valid=30s;
      set $store_host store-service:8080;
      proxy_pass http://$store_host/;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    location = /orderservice {
      return 301 /orderservice/;
    }

    location /orderservice/ {
      resolver 127.0.0.11 valid=30s;
      set $order_service_host order-service:8080;
      proxy_pass http://$order_service_host/;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    location = /paymentservice {
      return 301 /paymentservice/;
    }

    location /paymentservice/ {
      resolver 127.0.0.11 valid=30s;
      set $payment_service_host payment-service:8080;
      proxy_pass http://$payment_service_host/;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
    }

    location = /auth {
      return 301 /auth/;
    }

    location /auth/ {
      resolver 127.0.0.11 valid=30s;
      proxy_pass http://keycloak:8080/; 
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;
    }
  }
}
